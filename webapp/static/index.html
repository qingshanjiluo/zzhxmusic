<!DOCTYPE html>
<!--
  MusicDL Web - Modern MP3 Music Downloader
  @version:  1.0.0
  @requires: Modern browser (ES2020+, CSS Grid, backdrop-filter)
  @author:   Architect
  @wcag:     WCAG 2.2 AA compliant contrast ratios
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MusicDL - 功能强大的音频MP3下载器，支持40+音源聚合搜索下载">
<meta name="theme-color" content="#6C5CE7">
<meta name="color-scheme" content="dark light">
<title>🎵 MusicDL - 音乐下载器</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ==================== Theme Toggle ==================== -->
<button id="theme-toggle" class="btn-glass btn-icon" aria-label="切换亮/暗主题" title="切换主题">
  <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<!-- ==================== Header ==================== -->
<header class="app-header">
  <div class="header-glass">
    <div class="logo-area">
      <span class="logo-icon">🎵</span>
      <h1 class="logo-text">MusicDL</h1>
      <span class="version-tag">v2.12.7</span>
    </div>
    <p class="header-subtitle">40+ 音源聚合搜索 · 高品质 MP3 下载</p>
  </div>
</header>

<!-- ==================== Main Container ==================== -->
<main class="main-container" role="main">

  <!-- ===== Search Panel (Glass Card) ===== -->
  <section class="panel search-panel" aria-labelledby="search-heading">
    <h2 id="search-heading" class="panel-title">🔍 搜索音乐</h2>

    <!-- Input Row -->
    <div class="search-row">
      <input
        id="search-input"
        class="input-glass"
        type="text"
        placeholder="输入歌曲名、歌手名..."
        autocomplete="off"
        maxlength="200"
        aria-label="搜索关键词"
      />
      <button id="search-btn" class="btn-primary" aria-label="搜索">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>搜索</span>
      </button>
      <button id="clear-search-btn" class="btn-glass btn-icon" aria-label="清除搜索" title="清除">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="kbd-hint" aria-hidden="true"><kbd>Ctrl</kbd>+<kbd>K</kbd></span>
    </div>

    <!-- Playlist URL row -->
    <div class="search-row playlist-row">
      <input
        id="playlist-input"
        class="input-glass input-sm"
        type="url"
        placeholder="或粘贴歌单链接 (网易云/QQ音乐等)..."
        aria-label="歌单链接"
      />
      <button id="parse-playlist-btn" class="btn-glass btn-sm" aria-label="解析歌单">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>解析歌单</span>
      </button>
    </div>

    <!-- Source Toggles -->
    <details class="source-details" id="source-details">
      <summary class="source-summary" aria-expanded="false">
        <span class="summary-text">📡 音源选择 <em id="source-count">(已选 6)</em></span>
        <span class="collapse-icon">▾</span>
      </summary>
      <div class="source-grid" id="source-grid" role="group" aria-label="音源列表">
        <!-- Populated by JS -->
      </div>
      <div class="source-actions">
        <button id="select-all-sources-btn" class="btn-glass btn-xs" aria-label="全选所有音源">全选</button>
        <button id="deselect-all-sources-btn" class="btn-glass btn-xs" aria-label="取消全选音源">取消全选</button>
      </div>
    </details>

    <!-- Search Status -->
    <div id="search-status" class="status-bar" aria-live="polite"></div>
  </section>

  <!-- ===== Results Panel ===== -->
  <section class="panel results-panel" id="results-panel" style="display:none" aria-labelledby="results-heading">
    <div class="panel-header-row">
      <h2 id="results-heading" class="panel-title">📋 搜索结果 <span id="result-count"></span></h2>
      <div class="result-actions">
        <button id="select-all-btn" class="btn-glass btn-xs" aria-label="全选">全选</button>
        <button id="deselect-all-btn" class="btn-glass btn-xs" aria-label="取消全选">取消</button>
        <button id="download-selected-btn" class="btn-primary btn-sm" aria-label="下载选中">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>下载选中</span>
        </button>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs" id="filter-tabs" role="tablist" aria-label="按音源筛选">
      <button class="filter-tab active" role="tab" data-filter="all" aria-selected="true">全部</button>
    </div>

    <!-- Song List -->
    <div class="song-list" id="song-list" role="list" aria-label="搜索结果列表">
      <!-- Populated by JS -->
    </div>

    <div id="results-empty" class="empty-state" style="display:none">
      <span class="empty-icon">🎶</span>
      <p>没有找到相关歌曲，试试换个关键词？</p>
    </div>
  </section>

  <!-- ===== Downloads Panel ===== -->
  <section class="panel downloads-panel" id="downloads-panel" aria-labelledby="downloads-heading">
    <h2 id="downloads-heading" class="panel-title">📥 下载任务</h2>
    <div class="progress-bar-wrapper" id="progress-wrapper">
      <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">等待任务...</span>
    </div>
    <div class="download-log" id="download-log" role="log" aria-label="下载日志" aria-live="polite">
      <p class="log-empty">暂无可下载任务，搜索后选择歌曲开始下载。</p>
    </div>
  </section>

  <!-- ===== History Panel ===== -->
  <section class="panel history-panel" id="history-panel" aria-labelledby="history-heading">
    <div class="panel-header-row">
      <h2 id="history-heading" class="panel-title">🕐 搜索历史</h2>
      <button id="clear-history-btn" class="btn-glass btn-xs btn-danger" aria-label="清除历史">清除全部</button>
    </div>
    <div class="history-list" id="history-list" role="list" aria-label="搜索历史">
      <p class="log-empty">暂无搜索历史。</p>
    </div>
  </section>

</main>

<!-- ==================== Toast ==================== -->
<div id="toast-container" class="toast-container" aria-live="assertive" aria-relevant="additions"></div>

<!-- ==================== Footer ==================== -->
<footer class="app-footer">
  <p>Built with ❤️ using <a href="https://github.com/CharlesPikachu/musicdl" target="_blank" rel="noopener">musicdl</a> engine | 40+ Sources</p>
</footer>

<!-- ==================== Scripts ==================== -->
<script src="/static/js/app.js"></script>
</body>
</html>
