name: 列出音源榜单

on:
  workflow_dispatch:
    inputs:
      source:
        description: '音源名称（QQ / Netease，留空列出全部）'
        required: false
        type: choice
        default: 'QQ'
        options:
          - 'QQ'
          - 'Netease'
          - ''

jobs:
  list-charts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 列出音源榜单
      id: list_charts
      run: |
        SOURCE="${{ github.event.inputs.source }}"
        if [ -z "$SOURCE" ]; then
          echo "--- 列出所有音源的全部榜单 ---"
          python src/smart_downloader.py --list-top-charts
        else
          echo "--- 列出 ${SOURCE} 音乐的全部榜单 ---"
          python src/smart_downloader.py --source-charts "$SOURCE"
        fi

    - name: 生成 Markdown 报告
      run: |
        SOURCE="${{ github.event.inputs.source }}"
        if [ -z "$SOURCE" ]; then
          python src/generate_charts_report.py
        else
          python src/generate_charts_report.py "$SOURCE"
        fi

        echo "报告内容:"
        cat charts-report.md

        # 写入到 GITHUB_STEP_SUMMARY
        if [ -n "$GITHUB_STEP_SUMMARY" ]; then
          cat charts-report.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: 上传榜单报告
      uses: actions/upload-artifact@v4
      with:
        name: charts-report-${{ github.run_id }}
        path: charts-report.md
        if-no-files-found: warn
