name: 热歌榜下载

on:
  workflow_dispatch:
    inputs:
      chart:
        description: '排行榜键名（如 qq_hot / netease_soar / 热歌榜 / hot）'
        required: true
        type: string
        default: 'qq_hot'
      chart_limit:
        description: '限制获取前 N 首（0=全部）'
        required: false
        type: number
        default: 20
      source:
        description: '首选音源'
        required: true
        type: choice
        default: 'QQMusicClient'
        options:
          - QQMusicClient
          - NeteaseMusicClient
          - KuwoMusicClient
          - KugouMusicClient
          - MiguMusicClient
      quality:
        description: '音质'
        required: true
        type: choice
        default: 'mp3'
        options:
          - flac
          - mp3
          - ape
          - wav
          - aac
          - auto
      max_workers:
        description: '并发下载数'
        required: false
        type: number
        default: 5
      filename_template:
        description: '文件命名模板，如 {index}. {title} - {artist}'
        required: false
        type: string
        default: '{index}. {title} - {artist}'
  schedule:
    # 北京时间每天 08:00 和 20:00 自动运行（UTC 00:00 和 12:00）
    - cron: '0 0,12 * * *'

jobs:
  top-charts-download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 显示运行参数
      run: |
        echo "排行榜: ${{ github.event.inputs.chart || 'qq_hot' }}"
        echo "限制数量: ${{ github.event.inputs.chart_limit || '20' }}"
        echo "首选音源: ${{ github.event.inputs.source || 'QQMusicClient' }}"
        echo "音质: ${{ github.event.inputs.quality || 'mp3' }}"
        echo "并发数: ${{ github.event.inputs.max_workers || '5' }}"

    - name: 获取热歌榜并下载
      id: download
      env:
        NETEASE_COOKIES: ${{ secrets.NETEASE_COOKIES }}
      run: |
        CHART="${{ github.event.inputs.chart || 'qq_hot' }}"
        LIMIT="${{ github.event.inputs.chart_limit || '20' }}"
        SOURCE="${{ github.event.inputs.source || 'QQMusicClient' }}"
        QUALITY="${{ github.event.inputs.quality || 'mp3' }}"
        WORKERS="${{ github.event.inputs.max_workers || '5' }}"
        TEMPLATE="${{ github.event.inputs.filename_template || '{index}. {title} - {artist}' }}"
        OUTPUT_DIR="./downloads/$CHART"

        CMD="python src/smart_downloader.py"
        CMD="$CMD --top-charts $CHART"
        CMD="$CMD --chart-limit $LIMIT"
        CMD="$CMD --source $SOURCE"
        CMD="$CMD --quality $QUALITY"
        CMD="$CMD --workers $WORKERS"
        CMD="$CMD -o $OUTPUT_DIR"
        CMD="$CMD --filename-template '$TEMPLATE'"

        echo "执行: $CMD"
        eval $CMD || echo "DOWNLOAD_EXIT_CODE=$?" >> $GITHUB_ENV

    - name: 列出下载文件
      run: |
        echo "--- 下载的文件 ---"
        CHART="${{ github.event.inputs.chart || 'qq_hot' }}"
        DOWNLOAD_DIR="./downloads/$CHART"
        if [ -d "$DOWNLOAD_DIR" ]; then
          find "$DOWNLOAD_DIR" -type f | head -50
          echo ""
          echo "文件总数:"
          find "$DOWNLOAD_DIR" -type f | wc -l
        else
          echo "无下载文件"
        fi

    - name: 打包下载文件
      run: |
        CHART="${{ github.event.inputs.chart || 'qq_hot' }}"
        DOWNLOAD_DIR="./downloads/$CHART"
        if [ -d "$DOWNLOAD_DIR" ] && [ "$(ls -A "$DOWNLOAD_DIR" 2>/dev/null)" ]; then
          ZIP_NAME="chart-${CHART//\//_}-$(date +%Y%m%d_%H%M%S).zip"
          cd downloads && zip -r "../$ZIP_NAME" "$CHART/"
          cd ..
          echo "ZIP 打包完成"
          ls -lh "$ZIP_NAME"
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV
        else
          echo "NO_FILES=true" >> $GITHUB_ENV
          echo "没有需要打包的文件"
        fi

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chart-download-${{ github.run_id }}
        path: chart-*.zip
        if-no-files-found: warn
