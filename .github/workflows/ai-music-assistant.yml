name: 🤖 AI 智能音乐助手

on:
  workflow_dispatch:
    inputs:
      task_goal:
        description: '🎯 任务目标（自然语言描述你的需求）'
        required: true
        type: string
        default: '帮我找周杰伦的中国风歌曲和洛天依的歌曲并下载'
      source:
        description: '🔊 首选音源'
        required: true
        type: choice
        default: 'QQMusicClient'
        options:
          - QQMusicClient
          - NeteaseMusicClient
          - KuwoMusicClient
          - KugouMusicClient
          - MiguMusicClient
          - SoundCloudClient
      quality:
        description: '🎵 音质'
        required: true
        type: choice
        default: 'mp3'
        options:
          - flac
          - mp3
          - ape
          - wav
          - aac
          - auto
      max_songs:
        description: '📊 最大歌曲数（0=不限制）'
        required: false
        type: number
        default: 30
      max_workers:
        description: '⚡ 并发下载数'
        required: false
        type: number
        default: 5
      no_download:
        description: '🔍 仅发现模式（只搜索不下载）'
        required: false
        type: boolean
        default: false

jobs:
  ai-music-assistant:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: 📥 Checkout 代码
      uses: actions/checkout@v4

    - name: 🐍 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r batch-music-downloader/requirements.txt

    - name: 🤖 显示任务参数
      run: |
        echo "=========================================="
        echo "  🤖 AI 智能音乐助手"
        echo "=========================================="
        echo "🎯 任务目标: ${{ github.event.inputs.task_goal }}"
        echo "🔊 音源: ${{ github.event.inputs.source }}"
        echo "🎵 音质: ${{ github.event.inputs.quality }}"
        echo "📊 最大歌曲数: ${{ github.event.inputs.max_songs }}"
        echo "⚡ 并发数: ${{ github.event.inputs.max_workers }}"
        echo "🔍 仅发现: ${{ github.event.inputs.no_download }}"
        echo ""

        # API 密钥检查（使用仓库 secrets，需要在仓库 Settings > Secrets and variables 中配置）
        if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
          echo "✅ DeepSeek API: 已配置"
        else
          echo "⚠️ DeepSeek API: 未配置（纯规则模式）"
        fi
        if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
          echo "✅ OpenAI API: 已配置"
        else
          echo "⚠️ OpenAI API: 未配置（纯规则模式）"
        fi
        if [ -n "${{ secrets.SERPAPI_KEY }}" ]; then
          echo "✅ SerpAPI: 已配置（增强网络搜索）"
        else
          echo "ℹ️ SerpAPI: 未配置（使用 DuckDuckGo 免费搜索）"
        fi

    - name: 🤖 运行 AI 智能音乐助手
      id: ai_assistant
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      run: |
        cd batch-music-downloader

        # 构建命令行
        CMD="python src/ai_assistant.py"
        CMD="$CMD --task '${{ github.event.inputs.task_goal }}'"
        CMD="$CMD --source ${{ github.event.inputs.source }}"
        CMD="$CMD --quality ${{ github.event.inputs.quality }}"
        CMD="$CMD --max-songs ${{ github.event.inputs.max_songs }}"
        CMD="$CMD --workers ${{ github.event.inputs.max_workers }}"

        # 传递 API 密钥（通过环境变量传递，命令行只传标记）
        if [ -n "$DEEPSEEK_API_KEY" ]; then
          CMD="$CMD --deepseek-key \"$DEEPSEEK_API_KEY\""
        elif [ -n "$OPENAI_API_KEY" ]; then
          CMD="$CMD --openai-key \"$OPENAI_API_KEY\""
        fi

        if [ -n "$SERPAPI_KEY" ]; then
          CMD="$CMD --serpapi-key \"$SERPAPI_KEY\""
        fi

        # 仅发现模式
        if [ "${{ github.event.inputs.no_download }}" = "true" ]; then
          CMD="$CMD --no-download"
        fi

        echo "执行: $CMD"
        echo ""

        # 执行
        eval $CMD
        EXIT_CODE=$?
        echo "AI_ASSISTANT_EXIT=$EXIT_CODE" >> $GITHUB_ENV

        # 检查报告文件
        if [ -f "ai-assistant-report.md" ]; then
          echo "AI_REPORT_EXISTS=true" >> $GITHUB_ENV
        fi

        echo ""
        echo "AI 助手退出码: $EXIT_CODE"

    - name: 📋 显示 AI 任务报告
      if: env.AI_REPORT_EXISTS == 'true'
      run: |
        echo "=========================================="
        echo "  📋 AI 任务报告"
        echo "=========================================="
        cat batch-music-downloader/ai-assistant-report.md
        echo ""
        echo "--- GITHUB_STEP_SUMMARY ---"
        if [ -f "batch-music-downloader/ai-assistant-report.md" ]; then
          cat batch-music-downloader/ai-assistant-report.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: 📜 列出发现的歌曲
      run: |
        echo "=========================================="
        echo "  📜 发现的歌曲列表"
        echo "=========================================="
        if [ -f "batch-music-downloader/song-queue.txt" ]; then
          echo "歌曲队列文件内容:"
          cat batch-music-downloader/song-queue.txt
        else
          echo "未生成歌曲队列文件"
        fi

    - name: 📂 列出下载文件
      run: |
        echo "=========================================="
        echo "  📂 下载文件"
        echo "=========================================="
        DOWNLOAD_DIR="batch-music-downloader/downloads"
        if [ -d "$DOWNLOAD_DIR" ]; then
          find "$DOWNLOAD_DIR" -type f | head -50
          echo ""
          FILE_COUNT=$(find "$DOWNLOAD_DIR" -type f ! -name "*.zip" | wc -l)
          echo "音频文件数: $FILE_COUNT"
        else
          echo "无下载文件"
        fi

    - name: 📦 打包下载文件
      if: github.event.inputs.no_download != 'true'
      run: |
        DOWNLOAD_DIR="batch-music-downloader/downloads"
        if [ -d "$DOWNLOAD_DIR" ] && [ "$(ls -A "$DOWNLOAD_DIR" 2>/dev/null)" ]; then
          ZIP_NAME="ai-music-download-$(date +%Y%m%d_%H%M%S).zip"
          cd batch-music-downloader
          if [ -d "downloads" ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
            # 排除已有的 zip 文件
            find downloads -type f ! -name "*.zip" | zip -@ "../$ZIP_NAME"
            cd ..
            echo "✅ ZIP 打包完成"
            ls -lh "$ZIP_NAME"
            echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV
          else
            cd ..
            echo "ℹ️ 下载目录为空，跳过打包"
            echo "NO_FILES=true" >> $GITHUB_ENV
          fi
        else
          echo "ℹ️ 无下载文件，跳过打包"
          echo "NO_FILES=true" >> $GITHUB_ENV
        fi

    - name: 📤 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-music-download-${{ github.run_id }}
        path: |
          ai-music-download-*.zip
          batch-music-downloader/ai-assistant-report.md
          batch-music-downloader/song-queue.txt
        if-no-files-found: warn
        retention-days: 30
