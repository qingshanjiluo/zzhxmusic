name: 网易云每日排行榜下载

on:
  schedule:
    # 北京时间每天 06:00 自动运行（UTC 22:00）
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      soar_limit:
        description: '飙升榜下载前 N 首'
        required: false
        type: number
        default: 30
      hot_limit:
        description: '热歌榜下载前 N 首'
        required: false
        type: number
        default: 30
      source:
        description: '首选音源'
        required: true
        type: choice
        default: 'NeteaseMusicClient'
        options:
          - NeteaseMusicClient
          - QQMusicClient
          - KuwoMusicClient
          - KugouMusicClient
          - MiguMusicClient
      quality:
        description: '音质'
        required: true
        type: choice
        default: 'flac'
        options:
          - flac
          - mp3
          - ape
          - wav
          - aac
          - auto
      max_workers:
        description: '并发下载数'
        required: false
        type: number
        default: 10

jobs:
  netease-soar:
    name: 🚀 网易云飙升榜 Top 30
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载网易云飙升榜
      id: download
      env:
        NETEASE_COOKIES: ${{ secrets.NETEASE_COOKIES }}
      run: |
        CHART="netease_soar"
        LIMIT="${{ github.event.inputs.soar_limit || '30' }}"
        SOURCE="${{ github.event.inputs.source || 'NeteaseMusicClient' }}"
        QUALITY="${{ github.event.inputs.quality || 'flac' }}"
        WORKERS="${{ github.event.inputs.max_workers || '10' }}"
        OUTPUT_DIR="./downloads/daily/netease_soar"
        TEMPLATE="{index}. {title} - {artist}"

        CMD="python src/smart_downloader.py"
        CMD="$CMD --top-charts $CHART"
        CMD="$CMD --chart-limit $LIMIT"
        CMD="$CMD --source $SOURCE"
        CMD="$CMD --quality $QUALITY"
        CMD="$CMD --workers $WORKERS"
        CMD="$CMD -o $OUTPUT_DIR"
        CMD="$CMD --filename-template '$TEMPLATE'"

        echo "执行: $CMD"
        eval $CMD || echo "DOWNLOAD_EXIT_CODE=$?" >> $GITHUB_ENV

    - name: 打包飙升榜
      run: |
        DOWNLOAD_DIR="./downloads/daily/netease_soar"
        if [ -d "$DOWNLOAD_DIR" ] && [ "$(ls -A "$DOWNLOAD_DIR" 2>/dev/null)" ]; then
          ZIP_NAME="netease_soar_$(date +%Y%m%d).zip"
          cd downloads/daily && zip -r "../../$ZIP_NAME" "netease_soar/"
          cd ../..
          echo "ZIP 打包完成: $ZIP_NAME"
          ls -lh "$ZIP_NAME"
          echo "SOAR_ZIP=$ZIP_NAME" >> $GITHUB_ENV
        else
          echo "飙升榜无下载文件"
        fi

    - name: 上传飙升榜 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: netease-soar-每日飙升榜
        path: netease_soar_*.zip
        if-no-files-found: warn

  netease-hot:
    name: 🔥 网易云热歌榜 Top 30
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 下载网易云热歌榜
      id: download
      env:
        NETEASE_COOKIES: ${{ secrets.NETEASE_COOKIES }}
      run: |
        CHART="netease_hot"
        LIMIT="${{ github.event.inputs.hot_limit || '30' }}"
        SOURCE="${{ github.event.inputs.source || 'NeteaseMusicClient' }}"
        QUALITY="${{ github.event.inputs.quality || 'flac' }}"
        WORKERS="${{ github.event.inputs.max_workers || '10' }}"
        OUTPUT_DIR="./downloads/daily/netease_hot"
        TEMPLATE="{index}. {title} - {artist}"

        CMD="python src/smart_downloader.py"
        CMD="$CMD --top-charts $CHART"
        CMD="$CMD --chart-limit $LIMIT"
        CMD="$CMD --source $SOURCE"
        CMD="$CMD --quality $QUALITY"
        CMD="$CMD --workers $WORKERS"
        CMD="$CMD -o $OUTPUT_DIR"
        CMD="$CMD --filename-template '$TEMPLATE'"

        echo "执行: $CMD"
        eval $CMD || echo "DOWNLOAD_EXIT_CODE=$?" >> $GITHUB_ENV

    - name: 打包热歌榜
      run: |
        DOWNLOAD_DIR="./downloads/daily/netease_hot"
        if [ -d "$DOWNLOAD_DIR" ] && [ "$(ls -A "$DOWNLOAD_DIR" 2>/dev/null)" ]; then
          ZIP_NAME="netease_hot_$(date +%Y%m%d).zip"
          cd downloads/daily && zip -r "../../$ZIP_NAME" "netease_hot/"
          cd ../..
          echo "ZIP 打包完成: $ZIP_NAME"
          ls -lh "$ZIP_NAME"
          echo "HOT_ZIP=$ZIP_NAME" >> $GITHUB_ENV
        else
          echo "热歌榜无下载文件"
        fi

    - name: 上传热歌榜 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: netease-hot-每日热歌榜
        path: netease_hot_*.zip
        if-no-files-found: warn
